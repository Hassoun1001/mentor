# Always-on public deploy with automatic HTTPS — the Oracle Cloud Always Free
# path. Same app + Postgres/Timescale as docker-compose.prod.yml, but the app
# is NOT published to the host; a Caddy reverse proxy terminates TLS on 80/443
# and forwards to it. The in-process learning loop is enabled by default so the
# system keeps ingesting, predicting, resolving and retraining 24/7.
#
#   docker compose -f docker-compose.caddy.yml up -d --build
#
# Required in .env next to this file: MENTOR_DOMAIN, MENTOR_DB_PASSWORD,
# MENTOR_AUTH_PASSWORD_HASH, MENTOR_JWT_SECRET. See ORACLE_DEPLOY.md.

services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MENTOR_DB_NAME:-mentor}
      POSTGRES_USER: ${MENTOR_DB_USER:-mentor}
      POSTGRES_PASSWORD: ${MENTOR_DB_PASSWORD:?set MENTOR_DB_PASSWORD in .env}
    volumes:
      - mentor_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MENTOR_DB_USER:-mentor} -d ${MENTOR_DB_NAME:-mentor}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MENTOR_ENV: production
      MENTOR_DB_HOST: db
      MENTOR_DB_NAME: ${MENTOR_DB_NAME:-mentor}
      MENTOR_DB_USER: ${MENTOR_DB_USER:-mentor}
      MENTOR_DB_PASSWORD: ${MENTOR_DB_PASSWORD:?}
      MENTOR_AUTH_USERNAME: ${MENTOR_AUTH_USERNAME:-mentor}
      MENTOR_AUTH_PASSWORD_HASH: ${MENTOR_AUTH_PASSWORD_HASH:?set MENTOR_AUTH_PASSWORD_HASH in .env}
      MENTOR_JWT_SECRET: ${MENTOR_JWT_SECRET:?set MENTOR_JWT_SECRET in .env}
      MENTOR_JWT_TTL_HOURS: ${MENTOR_JWT_TTL_HOURS:-12}
      MENTOR_CORS_ORIGINS: "https://${MENTOR_DOMAIN:?set MENTOR_DOMAIN in .env}"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      MENTOR_LLM_MODEL: ${MENTOR_LLM_MODEL:-claude-opus-4-8}
      # Always-on learning: ingest fresh bars, predict, resolve, retrain.
      MENTOR_LOOP_ENABLED: ${MENTOR_LOOP_ENABLED:-true}
    # No host port: only Caddy can reach the app, on the internal network.
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      MENTOR_DOMAIN: ${MENTOR_DOMAIN:?set MENTOR_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mentor_db_data:
  caddy_data:
  caddy_config:
